<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1d4ed8"/>
      <stop offset="55%" stop-color="#0f2044"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>
    <linearGradient id="clip_bar" x1="176" y1="88" x2="336" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="check_circle" x1="300" y1="310" x2="430" y2="430" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="shimmer" x1="0" y1="0" x2="512" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="rgba(255,255,255,0)"/>
      <stop offset="50%" stop-color="rgba(255,255,255,0.07)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="rgba(0,0,0,0.5)"/>
    </filter>
  </defs>

  <!-- Background rounded rect -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Subtle shimmer overlay -->
  <rect width="512" height="512" rx="112" fill="url(#shimmer)"/>

  <!-- Inner border -->
  <rect x="2" y="2" width="508" height="508" rx="110" stroke="rgba(255,255,255,0.1)" stroke-width="3" fill="none"/>

  <!-- Clipboard body -->
  <rect x="120" y="160" width="272" height="240" rx="28" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.18)" stroke-width="3" filter="url(#shadow)"/>

  <!-- Clipboard inner panel -->
  <rect x="134" y="174" width="244" height="212" rx="20" fill="rgba(255,255,255,0.05)"/>

  <!-- Clipboard top clip -->
  <rect x="192" y="128" width="128" height="68" rx="18" fill="url(#clip_bar)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>

  <!-- Hole in clip -->
  <circle cx="256" cy="156" r="14" fill="rgba(10,22,40,0.7)" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
  <circle cx="256" cy="156" r="6" fill="rgba(56,189,248,0.4)"/>

  <!-- Text lines on clipboard -->
  <!-- Line 1 - full -->
  <rect x="158" y="240" width="196" height="11" rx="5.5" fill="rgba(255,255,255,0.5)"/>
  <!-- Line 2 - medium -->
  <rect x="158" y="268" width="148" height="9" rx="4.5" fill="rgba(255,255,255,0.32)"/>
  <!-- Line 3 - short -->
  <rect x="158" y="293" width="100" height="9" rx="4.5" fill="rgba(255,255,255,0.2)"/>
  <!-- Line 4 - short -->
  <rect x="158" y="318" width="120" height="9" rx="4.5" fill="rgba(255,255,255,0.15)"/>

  <!-- Check circle badge (bottom-right) -->
  <circle cx="360" cy="368" r="72" fill="url(#bg)"/>
  <circle cx="360" cy="368" r="62" fill="url(#check_circle)" filter="url(#glow)"/>
  <circle cx="360" cy="368" r="62" stroke="rgba(255,255,255,0.25)" stroke-width="3" fill="none"/>

  <!-- Checkmark -->
  <polyline
    points="326,368 347,390 394,342"
    stroke="white"
    stroke-width="16"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
  />

  <!-- Top-left corner dot accent -->
  <circle cx="148" cy="188" r="7" fill="rgba(56,189,248,0.6)"/>
</svg>
