<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<meta name="theme-color" content="#007bff">

<title>Quản lý giao việc</title>

<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.svg">

<style>

html,body{
margin:0;
padding:0;
height:100%;
background:#f5f5f5;
font-family:Arial,Helvetica,sans-serif;
overflow:hidden;
}

/* loader */

#loader{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:white;
display:flex;
align-items:center;
justify-content:center;
z-index:9999;
transition:opacity .4s ease;
}

.spinner{
width:50px;
height:50px;
border:5px solid #e0e0e0;
border-top:5px solid #007bff;
border-radius:50%;
animation:spin 1s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0deg)}
100%{transform:rotate(360deg)}
}

/* iframe wrapper */

#appFrame{
border:none;
width:100%;
height:calc(100% + 45px);
margin-top:-45px;
}

.fade-out{
opacity:0;
pointer-events:none;
}

</style>
</head>

<body>

<div id="loader">
<div class="spinner"></div>
</div>

<iframe
id="appFrame"
src="https://script.google.com/macros/s/AKfycbwf_bHFVyH5OIBC3AcYRI9r18kR4xdXKa0EEJ64kESwu6DJiySjd_y9COIROUGPP08/exec"
allow="
camera;
microphone;
geolocation;
fullscreen;
clipboard-read;
clipboard-write">
</iframe>

<script>

/* Ẩn loader khi iframe load xong */

const frame = document.getElementById("appFrame");
const loader = document.getElementById("loader");

frame.onload = () => {

loader.classList.add("fade-out");

setTimeout(()=>{
loader.style.display="none";
},400);

};

/* đăng ký service worker */

if("serviceWorker" in navigator){

navigator.serviceWorker.register("sw.js");

}

</script>

</body>
</html>
