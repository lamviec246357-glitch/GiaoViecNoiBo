<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

  <title>Giao Việc Nội Bộ</title>
  <meta name="description" content="Hệ thống quản lý và phân công công việc nội bộ">
  <meta name="application-name" content="Giao Việc Nội Bộ">

  <!-- PWA Meta Tags -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Giao Việc">
  <meta name="theme-color" content="#0a1628">
  <meta name="msapplication-TileColor" content="#0a1628">
  <meta name="msapplication-navbutton-color" content="#0a1628">

  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json">

  <!-- Icons -->
  <link rel="icon" type="image/svg+xml" href="icons/icon.svg">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="apple-touch-icon" sizes="152x152" href="icons/icon-152.png">
  <link rel="apple-touch-icon" sizes="180x180" href="icons/icon-180.png">

  <!-- Splash screens iOS -->
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <style>
    /* ── Reset & Base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy-900: #0a1628;
      --navy-800: #0f2044;
      --blue-500: #2563eb;
      --blue-400: #3b82f6;
      --accent:   #38bdf8;
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--navy-900);
      font-family: 'Be Vietnam Pro', -apple-system, BlinkMacSystemFont, sans-serif;
      -webkit-tap-highlight-color: transparent;
      -webkit-text-size-adjust: 100%;
    }

    /* ── Wrapper toàn màn hình ── */
    #app-shell {
      position: fixed;
      inset: 0;
      /* Hỗ trợ iPhone notch */
      top: env(safe-area-inset-top, 0px);
      bottom: env(safe-area-inset-bottom, 0px);
      left: env(safe-area-inset-left, 0px);
      right: env(safe-area-inset-right, 0px);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--navy-900);
    }

    /* ── iFrame container ── */
    #iframe-wrap {
      position: relative;
      flex: 1;
      overflow: hidden;
    }

    /* Kỹ thuật che banner Google "Ứng dụng này do một người dùng Google tạo"
       Banner cao ~45px nằm ở đầu iframe → đẩy lên -45px, bù height */
    #app-frame {
      position: absolute;
      top: -45px;
      left: 0;
      right: 0;
      width: 100%;
      height: calc(100% + 45px);
      border: none;
      display: block;
      background: transparent;
    }

    /* ── LOADING SCREEN ── */
    #loader {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 28px;
      background:
        radial-gradient(ellipse 80% 60% at 20% 10%, rgba(37,99,235,0.3) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 90%, rgba(14,165,233,0.2) 0%, transparent 55%),
        linear-gradient(135deg, #0a1628 0%, #0f2044 50%, #0a1628 100%);
      transition: opacity 0.5s ease, visibility 0.5s ease;
    }

    /* Grid dots background */
    #loader::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
    }

    #loader.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    /* App icon trong loader */
    .loader-icon {
      position: relative;
      width: 88px; height: 88px;
      animation: loader-icon-in 0.6s cubic-bezier(0.22,1,0.36,1) both;
    }

    .loader-icon svg {
      width: 88px; height: 88px;
      filter: drop-shadow(0 8px 32px rgba(37,99,235,0.6));
    }

    /* Vòng xoay bao quanh icon */
    .spin-ring {
      position: absolute;
      inset: -10px;
      border-radius: 50%;
      border: 2.5px solid transparent;
      border-top-color: var(--accent);
      border-right-color: rgba(56,189,248,0.3);
      animation: spin 1.1s linear infinite;
    }

    .spin-ring-2 {
      position: absolute;
      inset: -18px;
      border-radius: 50%;
      border: 1.5px solid transparent;
      border-top-color: rgba(56,189,248,0.25);
      border-left-color: rgba(37,99,235,0.2);
      animation: spin 2s linear infinite reverse;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes loader-icon-in {
      from { opacity: 0; transform: scale(0.7); }
      to   { opacity: 1; transform: scale(1); }
    }

    /* Text loading */
    .loader-text {
      text-align: center;
      animation: loader-icon-in 0.6s 0.2s cubic-bezier(0.22,1,0.36,1) both;
    }

    .loader-text h2 {
      font-size: 1.2rem;
      font-weight: 800;
      color: #f0f6ff;
      letter-spacing: -0.3px;
      margin-bottom: 6px;
    }

    .loader-text p {
      font-size: 0.78rem;
      color: rgba(148,180,212,0.7);
      letter-spacing: 0.5px;
    }

    /* Dots nhảy */
    .loader-dots {
      display: flex;
      gap: 7px;
      margin-top: 4px;
    }

    .loader-dots span {
      width: 7px; height: 7px;
      background: var(--accent);
      border-radius: 50%;
      animation: dot-bounce 1.2s ease-in-out infinite;
    }
    .loader-dots span:nth-child(2) { animation-delay: 0.2s; }
    .loader-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes dot-bounce {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
      40%           { transform: scale(1);   opacity: 1; }
    }

    /* Progress bar */
    .loader-bar-wrap {
      width: 160px; height: 3px;
      background: rgba(255,255,255,0.08);
      border-radius: 3px;
      overflow: hidden;
      animation: loader-icon-in 0.6s 0.3s both;
    }

    .loader-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--blue-500), var(--accent));
      border-radius: 3px;
      animation: bar-fill 2.5s cubic-bezier(0.4,0,0.2,1) forwards;
    }

    @keyframes bar-fill {
      from { width: 0%; }
      to   { width: 90%; }
    }

    /* ── INSTALL PROMPT (Android) ── */
    #install-prompt {
      display: none;
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 8888;
      background: rgba(15,32,68,0.95);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(56,189,248,0.25);
      border-radius: 18px;
      padding: 16px 20px;
      max-width: calc(100vw - 32px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      animation: slide-up 0.4s cubic-bezier(0.22,1,0.36,1);
    }

    @keyframes slide-up {
      from { transform: translateX(-50%) translateY(80px); opacity: 0; }
      to   { transform: translateX(-50%) translateY(0); opacity: 1; }
    }

    #install-prompt.show { display: flex; align-items: center; gap: 14px; }

    .install-icon { width: 44px; height: 44px; flex-shrink: 0; }
    .install-icon svg { width: 44px; height: 44px; }

    .install-text h3 {
      font-size: 0.88rem; font-weight: 700;
      color: #f0f6ff; margin-bottom: 2px;
    }
    .install-text p {
      font-size: 0.72rem; color: rgba(148,180,212,0.8);
    }

    .install-actions { display: flex; gap: 8px; margin-left: auto; flex-shrink: 0; }

    .btn-install {
      background: linear-gradient(135deg, var(--blue-500), #1d4fd8);
      color: #fff; border: none; border-radius: 10px;
      padding: 8px 16px; font-size: 0.8rem; font-weight: 700;
      cursor: pointer; white-space: nowrap;
      box-shadow: 0 4px 12px rgba(37,99,235,0.4);
    }
    .btn-dismiss {
      background: rgba(255,255,255,0.08);
      color: rgba(148,180,212,0.8);
      border: none; border-radius: 10px;
      padding: 8px 12px; font-size: 0.8rem;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <!-- ══════════════════════
       LOADING SCREEN
  ══════════════════════ -->
  <div id="loader">
    <div class="loader-icon">
      <div class="spin-ring-2"></div>
      <div class="spin-ring"></div>
      <!-- App Icon SVG inline -->
      <svg viewBox="0 0 88 88" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="88" height="88" rx="22" fill="url(#lg1)"/>
        <rect x="1" y="1" width="86" height="86" rx="21" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>
        <!-- Clipboard base -->
        <rect x="22" y="28" width="44" height="38" rx="6" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
        <!-- Clipboard top clip -->
        <rect x="32" y="22" width="24" height="12" rx="4" fill="url(#lg2)" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
        <!-- Lines on clipboard -->
        <line x1="29" y1="42" x2="59" y2="42" stroke="rgba(255,255,255,0.55)" stroke-width="2" stroke-linecap="round"/>
        <line x1="29" y1="50" x2="52" y2="50" stroke="rgba(255,255,255,0.35)" stroke-width="2" stroke-linecap="round"/>
        <line x1="29" y1="58" x2="45" y2="58" stroke="rgba(255,255,255,0.25)" stroke-width="2" stroke-linecap="round"/>
        <!-- Checkmark circle -->
        <circle cx="62" cy="58" r="10" fill="url(#lg3)"/>
        <polyline points="57,58 60,62 67,54" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        <defs>
          <linearGradient id="lg1" x1="0" y1="0" x2="88" y2="88" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#1d4ed8"/>
            <stop offset="100%" stop-color="#0a1628"/>
          </linearGradient>
          <linearGradient id="lg2" x1="32" y1="22" x2="56" y2="34" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#38bdf8"/>
            <stop offset="100%" stop-color="#2563eb"/>
          </linearGradient>
          <linearGradient id="lg3" x1="52" y1="48" x2="72" y2="68" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#34d399"/>
            <stop offset="100%" stop-color="#059669"/>
          </linearGradient>
        </defs>
      </svg>
    </div>

    <div class="loader-text">
      <h2>Giao Việc Nội Bộ</h2>
      <p>Đang khởi động hệ thống...</p>
      <div class="loader-dots">
        <span></span><span></span><span></span>
      </div>
    </div>

    <div class="loader-bar-wrap">
      <div class="loader-bar"></div>
    </div>
  </div>

  <!-- ══════════════════════
       APP SHELL
  ══════════════════════ -->
  <div id="app-shell">
    <div id="iframe-wrap">
      <iframe
        id="app-frame"
        src="https://script.google.com/macros/s/AKfycbwf_bHFVyH5OIBC3AcYRI9r18kR4xdXKa0EEJ64kESwu6DJiySjd_y9COIROUGPP08/exec"
        title="Hệ Thống Giao Việc Nội Bộ"
        allow="camera; microphone; geolocation; clipboard-write; accelerometer; gyroscope"
        allowfullscreen
        loading="eager"
        sandbox="allow-scripts allow-forms allow-same-origin allow-popups allow-popups-to-escape-sandbox allow-downloads allow-modals"
      ></iframe>
    </div>
  </div>

  <!-- ══════════════════════
       INSTALL PROMPT (Android PWA)
  ══════════════════════ -->
  <div id="install-prompt">
    <div class="install-icon">
      <svg viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="44" height="44" rx="11" fill="url(#il1)"/>
        <rect x="11" y="14" width="22" height="19" rx="3" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
        <line x1="14" y1="21" x2="30" y2="21" stroke="rgba(255,255,255,0.6)" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="14" y1="25" x2="26" y2="25" stroke="rgba(255,255,255,0.4)" stroke-width="1.5" stroke-linecap="round"/>
        <circle cx="31" cy="29" r="6" fill="url(#il2)"/>
        <polyline points="28,29 30,32 34,26" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        <defs>
          <linearGradient id="il1" x1="0" y1="0" x2="44" y2="44">
            <stop offset="0%" stop-color="#2563eb"/><stop offset="100%" stop-color="#0a1628"/>
          </linearGradient>
          <linearGradient id="il2" x1="25" y1="23" x2="37" y2="35">
            <stop offset="0%" stop-color="#34d399"/><stop offset="100%" stop-color="#059669"/>
          </linearGradient>
        </defs>
      </svg>
    </div>
    <div class="install-text">
      <h3>Cài đặt ứng dụng</h3>
      <p>Thêm vào màn hình chính để dùng offline</p>
    </div>
    <div class="install-actions">
      <button class="btn-dismiss" onclick="dismissInstall()">Bỏ qua</button>
      <button class="btn-install" onclick="installApp()">Cài đặt</button>
    </div>
  </div>

  <script>
    // ── Đăng ký Service Worker ──
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('sw.js')
          .then(function(reg) { console.log('SW registered:', reg.scope); })
          .catch(function(err) { console.warn('SW failed:', err); });
      });
    }

    // ── Loading screen ──
    var loader = document.getElementById('loader');
    var frame  = document.getElementById('app-frame');
    var loadTimeout;

    function hideLoader() {
      clearTimeout(loadTimeout);
      loader.classList.add('hidden');
    }

    // Ẩn loader khi iframe load xong
    frame.addEventListener('load', function() {
      // Delay nhỏ để app bên trong kịp render
      setTimeout(hideLoader, 600);
    });

    // Fallback: nếu sau 8s chưa load xong vẫn ẩn loader
    loadTimeout = setTimeout(hideLoader, 8000);

    // ── PWA Install Prompt ──
    var deferredPrompt = null;
    var installPrompt  = document.getElementById('install-prompt');

    window.addEventListener('beforeinstallprompt', function(e) {
      e.preventDefault();
      deferredPrompt = e;
      // Hiện prompt sau 3s
      setTimeout(function() {
        // Không hiện nếu đã đứng trong standalone mode
        if (window.matchMedia('(display-mode: standalone)').matches) return;
        installPrompt.classList.add('show');
      }, 3000);
    });

    function installApp() {
      installPrompt.classList.remove('show');
      if (deferredPrompt) {
        deferredPrompt.prompt();
        deferredPrompt.userChoice.then(function(r) {
          console.log('Install result:', r.outcome);
          deferredPrompt = null;
        });
      }
    }

    function dismissInstall() {
      installPrompt.classList.remove('show');
    }

    // ── Ẩn install prompt nếu đang dùng standalone ──
    if (window.matchMedia('(display-mode: standalone)').matches) {
      installPrompt.style.display = 'none';
    }

    // ── Ngăn rubber-band scroll trên iOS ──
    document.body.addEventListener('touchmove', function(e) {
      if (e.target === document.body) e.preventDefault();
    }, { passive: false });
  </script>
</body>
</html>
